{{ range site.Menus.main }}
<div class="nav-section">
  <a href="{{ if .Page }}{{ .Page.RelPermalink }}{{ else }}{{ .URL | relURL }}{{ end }}">{{ .Name }}</a>
  {{ $section := .Page }}
  {{ if not $section }}
  {{ $section = site.GetPage .URL }}
  {{ end }}
  {{ if $section }}
  <ul>
    {{ range $section.RegularPages.ByWeight }}
    <li><a href="{{ .RelPermalink }}"{{ if eq .RelPermalink $.RelPermalink }} class="active"{{ end }}>{{ .Title }}</a></li>
    {{ end }}
  </ul>
  {{ end }}
</div>
{{ end }}
